services:
  n8n:
    image: n8nio/n8n:1.76.1
    container_name: n8n-prospector
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-trocar-esta-senha}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      # Integração CRM (consumidas por HTTP Request nodes via $env)
      - CRM_API_URL=${CRM_API_URL:-}
      - CRM_INGEST_API_KEY=${CRM_INGEST_API_KEY:-}
      - CRM_TENANT_ID=${CRM_TENANT_ID:-}
      - CRM_INGEST_CLASSES=${CRM_INGEST_CLASSES:-QUENTE,MORNO}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./exports:/home/node/exports
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      scraper:
        condition: service_healthy

  scraper:
    build: ./scraper
    container_name: bookou-scraper
    restart: unless-stopped
    ports:
      - "3099:3099"
    environment:
      - PORT=3099
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - FOURSQUARE_API_KEY=${FOURSQUARE_API_KEY:-}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY:-}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://187.77.54.141:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-bookou}
      - SEGMENT_ID=${SEGMENT_ID:-barbearias}
      - SCRAPER_API_KEY=${SCRAPER_API_KEY:-}
      - ENRICH_CONCURRENCY=${ENRICH_CONCURRENCY:-3}
      - CACHE_BACKEND=${CACHE_BACKEND:-memory}
      - CACHE_DIR=/home/node/exports/.cache
      - STORAGE_BACKEND=${STORAGE_BACKEND:-file}
      - EXPORTS_DIR=/home/node/exports
      # Chatbot
      - HANDOFF_PHONE=${HANDOFF_PHONE:-5562995513691}
      - HANDOFF_WEBHOOK_URL=${HANDOFF_WEBHOOK_URL:-}
      - DAILY_SEND_LIMIT=${DAILY_SEND_LIMIT:-10}
      - MIN_DELAY_MS=${MIN_DELAY_MS:-45000}
      - MAX_DELAY_MS=${MAX_DELAY_MS:-90000}
      - WORKING_HOURS_START=${WORKING_HOURS_START:-9}
      - WORKING_HOURS_END=${WORKING_HOURS_END:-18}
    volumes:
      - ./exports:/home/node/exports
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3099/health',r=>{process.exit(r.statusCode===200?0:1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      evolution:
        condition: service_started

  evolution:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-}
      - WEBHOOK_URL=http://scraper:3099/api/whatsapp/webhook
      - WEBHOOK_BY_EVENTS=false
      - WEBHOOK_BASE64=false
      - DATABASE_ENABLED=false
      - CACHE_REDIS_ENABLED=false
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false
      - DEL_INSTANCE=false
    volumes:
      - evolution_data:/evolution/instances

volumes:
  n8n_data:
  evolution_data:
