services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-prospector
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=bookou2026
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
      - ./exports:/home/node/exports
    depends_on:
      - scraper

  scraper:
    build: ./scraper
    container_name: bookou-scraper
    restart: unless-stopped
    ports:
      - "3099:3099"
    environment:
      - PORT=3099
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - FOURSQUARE_API_KEY=${FOURSQUARE_API_KEY:-}
      - GOOGLE_SEARCH_API_KEY=${GOOGLE_SEARCH_API_KEY:-}
      - GOOGLE_SEARCH_ENGINE_ID=${GOOGLE_SEARCH_ENGINE_ID:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-bookou-evolution-key}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE:-bookou}
    volumes:
      - ./exports:/home/node/exports
    depends_on:
      - evolution

  evolution:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-bookou-evolution-key}
      - DATABASE_ENABLED=false
      - CACHE_REDIS_ENABLED=false
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - LOG_LEVEL=ERROR
      - LOG_COLOR=false
      - DEL_INSTANCE=false
    volumes:
      - evolution_data:/evolution/instances

volumes:
  n8n_data:
  evolution_data:
